name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release zip
        run: |
          cd custom_components/color_notify
          zip -r ../../color_notify.zip ./*

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: color_notify.zip
